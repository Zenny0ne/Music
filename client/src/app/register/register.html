<div class="register-shell">
  <div class="register-card">
    <div class="register-brand">
      <div class="brand-icon">♪</div>
      <div>
        <h2>Crea il tuo account</h2>
        <p>Unisciti a Music e inizia ad ascoltare</p>
      </div>
    </div>

    <form class="register-form">
      <div class="mb-3">
        <label for="fullName" class="form-label">Nome completo</label>
        <input type="text" class="form-control" id="fullName" placeholder="Mario Rossi">
      </div>

      <div class="mb-3">
        <label for="userName" class="form-label">Nome utente</label>
        <input type="text" class="form-control" id="userName" placeholder="mario88">
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="nome@email.com">
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Crea una password">
      </div>

      <div class="mb-3">
        <label for="profileImage" class="form-label">Immagine profilo</label>
        <input type="file" class="form-control" id="profileImage" accept="image/*">
      </div>

      <div class="form-check mb-3">
        <input type="checkbox" class="form-check-input" id="isArtist">
        <label class="form-check-label" for="isArtist">Registro un account artista</label>
      </div>

      <button type="submit" class="btn btn-primary w-100">Registrati</button>
    </form>

    <div class="register-footer">
      <span>Hai già un account?</span>
      <a [routerLink]="'/login'">Accedi</a>
    </div>
  </div>
</div>
