<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">♫</div>
      <div>
        <h2>Benvenuto</h2>
        <p>Accedi per continuare l'ascolto</p>
      </div>
    </div>

    <form class="login-form">
      <div class="mb-3">
        <label for="exampleInputEmail1" class="form-label">Email</label>
        <input type="email" class="form-control" id="exampleInputEmail1" placeholder="nome@email.com">
      </div>

      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Password</label>
        <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Inserisci la password">
      </div>

      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="exampleCheck1">
        <label class="form-check-label" for="exampleCheck1">Accedi come artista</label>
      </div>

      <button type="submit" class="btn btn-primary w-100">Accedi</button>
    </form>

    <div class="login-footer">
      <span>Non hai un account?</span>
      <a [routerLink]="'/register'">Registrati</a>
    </div>
  </div>
</div>
